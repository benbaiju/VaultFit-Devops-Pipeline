name: vaultfit

services:
  backend:
    image: benbaiju/vaultfit-backend:latest
    container_name: vaultfit-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: 0.0.0.0
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - vaultfit-net

  frontend:
    image: benbaiju/vaultfit-frontend:latest
    container_name: vaultfit-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - vaultfit-net

networks:
  vaultfit-net:
    driver: bridge