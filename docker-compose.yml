name: vaultfit

services:
  backend:
    image: benbaiju/vaultfit-backend:latest
    container_name: vaultfit-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: 0.0.0.0
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - vaultfit-net

  frontend:
    image: benbaiju/vaultfit-frontend:latest
    container_name: vaultfit-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - vaultfit-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: vaultfit-prometheus
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - vaultfit-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: vaultfit-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - vaultfit-net

volumes:
  grafana-data:

networks:
  vaultfit-net:
    driver: bridge